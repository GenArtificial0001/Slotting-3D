<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cargando Sistema de Slotting 3D…</title>
<style>html,body{height:100%;margin:0;background:#04101d;color:#eaf9ff;font-family:Inter,Arial,sans-serif}.boot{height:100%;display:grid;place-items:center}.panel{text-align:center}.spinner{width:44px;height:44px;margin:0 auto 18px;border:3px solid rgba(73,215,255,.18);border-top-color:#49d7ff;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}small{color:#8fb8d0}</style>
</head>
<body><div class="boot"><div class="panel"><div class="spinner"></div><b>Preparando experiencia logística 3D</b><br><small>Aplicando la versión v42 multipasillo ABC…</small></div></div>
<script>
(async()=>{
  const fail=(e)=>{document.body.innerHTML='<div class="boot"><div class="panel"><b>No se pudo iniciar el sistema</b><br><small>'+String(e)+'</small></div></div>';console.error(e)};
  try{
    const [base,b64]=await Promise.all([
      fetch('./base-v34.html?base=34').then(r=>{if(!r.ok)throw new Error('No se encontró la base v34');return r.text()}),
      fetch('./v34_to_v42.patch.gz.b64?patch=42').then(r=>{if(!r.ok)throw new Error('No se encontró el parche v42');return r.text()})
    ]);
    const bin=Uint8Array.from(atob(b64.trim()),c=>c.charCodeAt(0));
    const patch=await new Response(new Blob([bin]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
    const src=base.replace(/\r\n/g,'\n').split('\n');
    const out=[];let cursor=0;
    const lines=patch.replace(/\r\n/g,'\n').split('\n');
    for(let i=0;i<lines.length;i++){
      const m=lines[i].match(/^@@ -(\d+)(?:,(\d+))? \+(\d+)(?:,(\d+))? @@/);
      if(!m)continue;
      const oldStart=Number(m[1])-1;
      while(cursor<oldStart)out.push(src[cursor++]);
      i++;
      for(;i<lines.length&&!lines[i].startsWith('@@ ');i++){
        const line=lines[i];
        if(line.startsWith(' ')){out.push(src[cursor++]);}
        else if(line.startsWith('-')){cursor++;}
        else if(line.startsWith('+')){out.push(line.slice(1));}
        else if(line.startsWith('\\ No newline')){}
      }
      i--;
    }
    while(cursor<src.length)out.push(src[cursor++]);
    const html=out.join('\n');
    document.open();document.write(html);document.close();
  }catch(e){fail(e)}
})();
</script></body></html>
