name: Deploy index from patch

on:
  push:
    branches: [main]
    paths:
      - '.deploy/READY'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply v42 patch to index.html
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, gzip

          payload = Path('.deploy/v34_to_v42.patch.gz.b64').read_text(encoding='ascii').strip()
          patch = gzip.decompress(base64.b64decode(payload))
          Path('.deploy/v34_to_v42.patch').write_bytes(patch)
          print(f'Decoded patch: {len(patch):,} bytes')
          PY
          git apply --check .deploy/v34_to_v42.patch
          git apply .deploy/v34_to_v42.patch

      - name: Commit index.html
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "index.html is already up to date"
            exit 0
          fi
          git commit -m "feat: publish v42 multipasillo ABC as index"
          git push origin main
